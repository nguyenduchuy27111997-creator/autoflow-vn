  <text x="210" y="460" text-anchor="middle" font-family="system-ui" font-size="20" fill="#F59E0B" font-weight="800">0 giờ</text>
  <text x="210" y="478" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">nhập liệu</text>

  <text x="420" y="460" text-anchor="middle" font-family="system-ui" font-size="20" fill="#3B82F6" font-weight="800">-80%</text>
  <text x="420" y="478" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">miss lịch</text>

  <text x="780" y="460" text-anchor="middle" font-family="system-ui" font-size="20" fill="#10B981" font-weight="800">+40%</text>
  <text x="780" y="478" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">quay lại</text>

  <text x="990" y="460" text-anchor="middle" font-family="system-ui" font-size="20" fill="#8B5CF6" font-weight="800">4.6⭐</text>
